spring:
  application:
    name: history_social_backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/history_social}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    time-zone: ${APP_TIMEZONE:Asia/Ho_Chi_Minh}

  config:
    import: optional:classpath:application-secret.yaml


server:
  port: ${PORT:8080}

  servlet:
    context-path: /history_social


app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}




messaging:
  redis:
    stream:
      name: social-events-stream
      consumer-group: notification-consumer-group
      consumer-name: notification-consumer-${random.uuid}
      batch-size: 10
      poll-timeout: 2000
      pending-messages-check-interval: 60000
      max-retry-count: 5
      claim-min-idle-time: 300000


ai:
  service:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}